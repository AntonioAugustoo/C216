services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: alunos_user
      POSTGRES_PASSWORD: alunos_password
      POSTGRES_DB: alunos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://alunos_user:alunos_password@db:5432/alunos_db
    depends_on:
      - db

  tests:
    build: ./backend
    command: pytest tests/ -v
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data: